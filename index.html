<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apps</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>

<main class="apps">

    <a href="apps/macromate/" class="app">
        <div class="app-icon">
            <i class="fa-solid fa-apple-whole"></i>
        </div>

        <div class="app-info">
            <h2>MacroMate</h2>
            <p>
                Calculate your daily calories and personalized protein,
                carbohydrate, and fat targets.
            </p>
        </div>

        <i class="fa-solid fa-arrow-right arrow"></i>
    </a>

    <a href="apps/caliper/" class="app">
        <div class="app-icon">
            <i class="fa-solid fa-ruler"></i>
        </div>

        <div class="app-info">
            <h2>Caliper</h2>
            <p>
                Measure and track your chest, waist, arms,
                thighs, calves, and other body measurements.
            </p>
        </div>

        <i class="fa-solid fa-arrow-right arrow"></i>
    </a>

    <p class="soon">More apps coming soon.</p>

</main>

</body>
</html>
