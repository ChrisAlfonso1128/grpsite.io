<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic Tac Toe</title>
<link rel="icon" type="image/svg+xml" href="../../../favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=Patrick+Hand&display=swap" rel="stylesheet">
<style>
  :root{
    --board:#1b3a2b;
    --board-2:#173324;
    --chalk:#eef3ec;
    --chalk-dim:#c9d4c5;
    --x-color:#ffd166;
    --o-color:#6fc3ff;
    --border:#0e2318;
  }
  html{ touch-action:manipulation; }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:30px;
    background:
      radial-gradient(circle at 20% 10%, rgba(255,255,255,0.03), transparent 40%),
      radial-gradient(circle at 80% 90%, rgba(255,255,255,0.03), transparent 40%),
      var(--board);
    background-blend-mode:screen;
    color:var(--chalk);
    font-family:'Patrick Hand', sans-serif;
    position:relative;
    overflow-x:hidden;
  }
  /* chalk dust texture */
  body::before{
    content:"";
    position:fixed; inset:0;
    background-image:
      radial-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      radial-gradient(rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size:3px 3px, 7px 7px;
    background-position:0 0, 2px 3px;
    pointer-events:none;
  }

  .back-link{
    align-self:flex-start;
    display:inline-flex; align-items:center; gap:6px;
    color:var(--chalk-dim); text-decoration:none;
    font-size:16px; margin-bottom:18px;
    border-bottom:2px dashed var(--chalk-dim);
    padding-bottom:2px;
  }
  .back-link:hover{ color:var(--chalk); }

  h1{
    font-family:'Caveat', cursive;
    font-size:64px;
    margin:0 0 4px;
    text-shadow:0 0 12px rgba(255,255,255,0.15);
  }
  .subtitle{
    font-size:18px;
    color:var(--chalk-dim);
    margin-bottom:20px;
  }

  .scoreboard{
    display:flex;
    gap:28px;
    margin-bottom:22px;
    font-size:20px;
  }
  .score-item{ text-align:center; }
  .score-item .n{ font-family:'Caveat', cursive; font-size:36px; display:block; }
  .score-item.x .n{ color:var(--x-color); }
  .score-item.o .n{ color:var(--o-color); }

  .status{
    font-family:'Caveat', cursive;
    font-size:32px;
    min-height:44px;
    margin-bottom:14px;
    text-align:center;
  }

  .board{
    display:grid;
    grid-template-columns:repeat(3, 100px);
    grid-template-rows:repeat(3, 100px);
    gap:0;
    position:relative;
    margin-bottom:26px;
  }
  .cell{
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Caveat', cursive;
    font-size:64px;
    cursor:pointer;
    user-select:none;
    color:var(--chalk);
    position:relative;
  }
  /* hand-drawn grid via borders, offset randomly-ish for chalk wobble */
  .cell:nth-child(1), .cell:nth-child(2), .cell:nth-child(3){
    border-bottom:3px solid var(--chalk-dim);
  }
  .cell:nth-child(7), .cell:nth-child(8), .cell:nth-child(9){
    border-top:none;
  }
  .cell:nth-child(4), .cell:nth-child(5), .cell:nth-child(6){
    border-top:3px solid var(--chalk-dim);
    border-bottom:3px solid var(--chalk-dim);
  }
  .cell:nth-child(1), .cell:nth-child(4), .cell:nth-child(7){
    border-right:3px solid var(--chalk-dim);
  }
  .cell:nth-child(3), .cell:nth-child(6), .cell:nth-child(9){
    border-left:none;
  }
  .cell:nth-child(2), .cell:nth-child(5), .cell:nth-child(8){
    border-left:3px solid var(--chalk-dim);
    border-right:3px solid var(--chalk-dim);
  }
  .board:hover .cell:not(.filled):hover{
    background:rgba(255,255,255,0.04);
  }
  .cell.x{ color:var(--x-color); text-shadow:0 0 10px rgba(255,209,102,0.5); }
  .cell.o{ color:var(--o-color); text-shadow:0 0 10px rgba(111,195,255,0.5); }
  .cell.win{ animation:pulse 0.6s ease-in-out infinite alternate; }
  @keyframes pulse{ from{ opacity:1; } to{ opacity:0.55; } }
  .cell.cheated{ animation:smudge 0.7s ease-out; }
  @keyframes smudge{
    0%{ filter:blur(3px); opacity:0.3; transform:scale(1.15); }
    100%{ filter:blur(0); opacity:1; transform:scale(1); }
  }

  button{
    font-family:'Patrick Hand', sans-serif;
    font-size:20px;
    background:transparent;
    color:var(--chalk);
    border:2px solid var(--chalk-dim);
    border-radius:10px;
    padding:10px 26px;
    cursor:pointer;
    transition:background .15s ease, transform .08s ease;
  }
  button:hover{ background:rgba(255,255,255,0.06); }
  button:active{ transform:scale(.96); }

  .mode-select{
    display:flex;
    gap:10px;
    margin-bottom:14px;
    flex-wrap:wrap;
    justify-content:center;
  }
  .pill{
    font-family:'Patrick Hand', sans-serif;
    font-size:16px;
    background:transparent;
    color:var(--chalk-dim);
    border:2px solid var(--chalk-dim);
    border-radius:20px;
    padding:8px 18px;
    cursor:pointer;
    transition:background .15s ease, color .15s ease, border-color .15s ease;
  }
  .pill:hover{ color:var(--chalk); }
  .pill.active{
    background:rgba(255,209,102,0.15);
    border-color:var(--x-color);
    color:var(--chalk);
  }
  .difficulty-select{
    display:none;
    gap:10px;
    margin-bottom:20px;
    flex-wrap:wrap;
    justify-content:center;
  }
  .difficulty-select.show{ display:flex; }
  .difficulty-select .pill.active{
    background:rgba(111,195,255,0.15);
    border-color:var(--o-color);
  }

  @media (max-width:420px){
    .board{
      grid-template-columns:repeat(3, 30vw);
      grid-template-rows:repeat(3, 30vw);
    }
    .cell{ font-size:48px; }
    h1{ font-size:48px; }
  }
</style>
</head>
<body>

<a class="back-link" href="../../index.html">← Arcade</a>
<h1>Tic Tac Toe</h1>
<p class="subtitle">chalk it up</p>

<div class="mode-select">
  <button type="button" class="pill active" data-mode="pvp">1 vs 1</button>
  <button type="button" class="pill" data-mode="bot">vs Bot</button>
</div>

<div class="difficulty-select" id="difficulty-select">
  <button type="button" class="pill active" data-difficulty="easy">Easy</button>
  <button type="button" class="pill" data-difficulty="medium">Medium</button>
  <button type="button" class="pill" data-difficulty="hard">Hard</button>
  <button type="button" class="pill" data-difficulty="impossible">Impossible</button>
</div>

<div class="scoreboard">
  <div class="score-item x"><span class="n" id="score-x">0</span>X wins</div>
  <div class="score-item"><span class="n" id="score-draw">0</span>draws</div>
  <div class="score-item o"><span class="n" id="score-o">0</span>O wins</div>
</div>

<div class="status" id="status">X's turn</div>

<div class="board" id="board"></div>

<button id="reset-btn">New Round</button>

<script>
const WIN_LINES = [
  [0,1,2],[3,4,5],[6,7,8],
  [0,3,6],[1,4,7],[2,5,8],
  [0,4,8],[2,4,6]
];

let cells = Array(9).fill(null);
let current = 'X';
let gameOver = false;
let scores = { X: 0, O: 0, draw: 0 };
let mode = 'pvp';       // 'pvp' or 'bot'
let difficulty = 'easy'; // 'easy' | 'medium' | 'hard' | 'impossible'
let botThinking = false;
let cheatedIndex = null; // which cell (if any) was just "smudged" by Impossible mode

const boardEl = document.getElementById('board');
const statusEl = document.getElementById('status');

// --- mode / difficulty selection ---
document.querySelectorAll('.mode-select .pill').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.mode-select .pill').forEach(b=> b.classList.remove('active'));
    btn.classList.add('active');
    mode = btn.dataset.mode;
    document.getElementById('difficulty-select').classList.toggle('show', mode === 'bot');
    document.querySelector('.score-item.o').lastChild.textContent = mode === 'bot' ? 'bot wins' : 'O wins';
    startNewRound();
  });
});
document.querySelectorAll('.difficulty-select .pill').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.difficulty-select .pill').forEach(b=> b.classList.remove('active'));
    btn.classList.add('active');
    difficulty = btn.dataset.difficulty;
    startNewRound();
  });
});

function buildBoard(){
  boardEl.innerHTML = '';
  cells.forEach((val, i)=>{
    const cell = document.createElement('div');
    cell.className = 'cell' + (val ? ' filled ' + val.toLowerCase() : '') + (i === cheatedIndex ? ' cheated' : '');
    cell.textContent = val || '';
    cell.dataset.index = i;
    cell.addEventListener('click', ()=> handleMove(i));
    boardEl.appendChild(cell);
  });
  cheatedIndex = null; // only flash once, right after it happens
}

function handleMove(i){
  if(gameOver || cells[i] || botThinking) return;
  if(mode === 'bot' && current !== 'X') return; // only the human (X) clicks
  cells[i] = current;
  finishMove(current);
}

// Shared by normal moves and the Impossible-mode "cheat" move — both just place a
// mark and then need the same win-check / scoring / turn-switch / auto-restart logic.
function finishMove(player){
  const winLine = checkWin();
  buildBoard();

  if(winLine){
    gameOver = true;
    scores[player]++;
    updateScoreboard();
    statusEl.textContent = mode === 'bot'
      ? (player === 'X' ? 'You win!' : 'Bot wins!')
      : `${player} wins!`;
    winLine.forEach(idx=> boardEl.children[idx].classList.add('win'));
    scheduleAutoRestart();
    return;
  }
  if(cells.every(c=> c)){
    gameOver = true;
    scores.draw++;
    updateScoreboard();
    statusEl.textContent = `It's a draw`;
    scheduleAutoRestart();
    return;
  }

  current = current === 'X' ? 'O' : 'X';
  updateStatusText();

  if(mode === 'bot' && current === 'O' && !gameOver){
    botThinking = true;
    setTimeout(botMove, 400); // small delay so the bot's move doesn't feel instant/jarring
  }
}

function scheduleAutoRestart(){
  setTimeout(()=>{
    if(gameOver) startNewRound(); // guard in case a manual "New Round" click already reset things
  }, 1800);
}

function updateStatusText(){
  if(mode === 'bot'){
    statusEl.textContent = current === 'X' ? 'Your turn' : 'Bot thinking…';
  } else {
    statusEl.textContent = `${current}'s turn`;
  }
}

function checkWin(boardState){
  const b = boardState || cells;
  for(const line of WIN_LINES){
    const [a,bi,c] = line;
    if(b[a] && b[a] === b[bi] && b[a] === b[c]) return line;
  }
  return null;
}

function updateScoreboard(){
  document.getElementById('score-x').textContent = scores.X;
  document.getElementById('score-o').textContent = scores.O;
  document.getElementById('score-draw').textContent = scores.draw;
}

// --- bot logic ---
function botMove(){
  botThinking = false;
  if(gameOver) return;

  if(difficulty === 'easy'){
    cells[randomMove()] = 'O';
    finishMove('O');
    return;
  }
  if(difficulty === 'medium'){
    const i = Math.random() < 0.5 ? bestMove('O').index : randomMove();
    cells[i] = 'O';
    finishMove('O');
    return;
  }
  if(difficulty === 'hard'){
    cells[bestMove('O').index] = 'O';
    finishMove('O');
    return;
  }

  // Impossible: play the normal best move UNLESS that only guarantees a draw,
  // in which case take over one of the human's marks instead — the only way to
  // guarantee the bot never draws or loses, since perfect tic-tac-toe play from
  // both sides is always a draw otherwise.
  const normal = bestMove('O');
  if(normal.score > 0){
    cells[normal.index] = 'O';
    finishMove('O');
    return;
  }
  const cheat = findCheatMove();
  if(cheat.index !== null){
    cells[cheat.index] = 'O';
    cheatedIndex = cheat.index;
    statusEl.textContent = 'the chalk... smudged?';
    finishMove('O');
  } else {
    // Fallback — shouldn't happen once this runs every turn, but never crash.
    cells[normal.index] = 'O';
    finishMove('O');
  }
}

function randomMove(){
  const open = cells.map((c,i)=> c ? null : i).filter(i=> i !== null);
  return open[Math.floor(Math.random() * open.length)];
}

// Minimax — exhaustive since the search space is tiny (max 9! states). Returns
// both the chosen index and its score so callers can tell a win from a draw.
function bestMove(player){
  const opponent = player === 'O' ? 'X' : 'O';
  let best = { score: -Infinity, index: null };

  cells.forEach((val, i)=>{
    if(val) return;
    cells[i] = player;
    const score = minimax(cells, opponent, player, 0);
    cells[i] = null;
    if(score > best.score){
      best = { score, index: i };
    }
  });
  return best;
}

// Looks for an X-occupied cell that, if taken over by O, secures a guaranteed win.
function findCheatMove(){
  let best = { score: -Infinity, index: null };
  cells.forEach((val, i)=>{
    if(val !== 'X') return;
    cells[i] = 'O';
    const score = minimax(cells, 'X', 'O', 0);
    cells[i] = 'X';
    if(score > best.score){
      best = { score, index: i };
    }
  });
  return best;
}

function minimax(board, turn, botPlayer, depth){
  const winLine = checkWin(board);
  if(winLine){
    const winner = board[winLine[0]];
    if(winner === botPlayer) return 10 - depth;
    return depth - 10;
  }
  if(board.every(c => c)) return 0;

  const opponent = turn === 'O' ? 'X' : 'O';
  const scores = [];
  board.forEach((val, i)=>{
    if(val) return;
    board[i] = turn;
    scores.push(minimax(board, opponent, botPlayer, depth + 1));
    board[i] = null;
  });

  return turn === botPlayer ? Math.max(...scores) : Math.min(...scores);
}

function startNewRound(){
  cells = Array(9).fill(null);
  current = 'X';
  gameOver = false;
  botThinking = false;
  cheatedIndex = null;
  updateStatusText();
  buildBoard();
}

document.getElementById('reset-btn').addEventListener('click', startNewRound);

buildBoard();
</script>
</body>
</html>
