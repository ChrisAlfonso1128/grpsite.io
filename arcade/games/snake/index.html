<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake</title>
<link rel="icon" type="image/svg+xml" href="../../../favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#020a03;
    --green:#39ff6a;
    --green-dim:#0f5c26;
    --green-glow:rgba(57,255,106,0.55);
  }
  html{ touch-action:manipulation; }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:24px;
    background:var(--bg);
    color:var(--green);
    font-family:'Share Tech Mono', monospace;
    position:relative;
    overflow:hidden;
  }
  /* scanlines */
  body::after{
    content:"";
    position:fixed; inset:0;
    background:repeating-linear-gradient(
      0deg, rgba(0,0,0,0.15) 0px, rgba(0,0,0,0.15) 1px,
      transparent 1px, transparent 3px
    );
    pointer-events:none;
    mix-blend-mode:multiply;
  }
  /* faint scan glow sweep */
  body::before{
    content:"";
    position:fixed; inset:0;
    background:radial-gradient(ellipse at 50% 40%, rgba(57,255,106,0.06), transparent 60%);
    pointer-events:none;
  }

  .back-link{
    align-self:flex-start;
    display:inline-flex; align-items:center; gap:6px;
    color:var(--green-dim); text-decoration:none;
    font-size:14px; margin-bottom:16px;
    border-bottom:1px solid var(--green-dim);
    text-shadow:0 0 4px var(--green-glow);
  }
  .back-link:hover{ color:var(--green); }

  h1{
    font-family:'VT323', monospace;
    font-size:56px;
    letter-spacing:.08em;
    margin:0 0 4px;
    text-shadow:0 0 10px var(--green-glow), 0 0 24px var(--green-glow);
  }
  .subtitle{
    font-size:13px;
    color:var(--green-dim);
    margin-bottom:18px;
    letter-spacing:.1em;
    text-transform:uppercase;
  }

  .hud{
    display:flex;
    gap:32px;
    margin-bottom:14px;
    font-size:18px;
  }
  .hud .label{ color:var(--green-dim); font-size:12px; letter-spacing:.1em; }
  .hud .value{ font-family:'VT323', monospace; font-size:26px; }

  .game-wrap{
    position:relative;
    border:2px solid var(--green-dim);
    box-shadow:0 0 20px rgba(57,255,106,0.15), inset 0 0 20px rgba(57,255,106,0.05);
    width:min(400px, 90vw);
  }
  canvas{
    display:block;
    background:#010602;
    width:100%;
    height:auto;
  }

  .overlay{
    position:absolute; inset:0;
    display:none;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    gap:14px;
    background:rgba(1,6,2,0.85);
    text-align:center;
  }
  .overlay.show{ display:flex; }
  .overlay h2{
    font-family:'VT323', monospace;
    font-size:40px;
    margin:0;
    text-shadow:0 0 10px var(--green-glow);
  }
  .overlay p{ margin:0; color:var(--green-dim); font-size:14px; }

  button{
    font-family:'Share Tech Mono', monospace;
    font-size:14px;
    background:transparent;
    color:var(--green);
    border:1px solid var(--green);
    border-radius:2px;
    padding:10px 22px;
    cursor:pointer;
    text-shadow:0 0 4px var(--green-glow);
    transition:background .15s ease, transform .08s ease;
    letter-spacing:.05em;
  }
  button:hover{ background:rgba(57,255,106,0.1); }
  button:active{ transform:scale(.96); }

  .controls-hint{
    margin-top:16px;
    font-size:12px;
    color:var(--green-dim);
    text-align:center;
    max-width:320px;
  }

  .touch-controls{
    display:none;
    margin-top:18px;
    gap:8px;
    grid-template-columns:repeat(3, 56px);
    grid-template-rows:repeat(2, 56px);
  }
  .touch-controls button{
    padding:0; font-size:20px;
  }
  @media (pointer:coarse){
    .touch-controls{ display:grid; }
  }
</style>
</head>
<body>

<a class="back-link" href="../../index.html">← Arcade</a>
<h1>SNAKE_</h1>
<p class="subtitle">// terminal edition</p>

<div class="hud">
  <div><div class="label">SCORE</div><div class="value" id="score">0</div></div>
  <div><div class="label">BEST</div><div class="value" id="best">0</div></div>
</div>

<div class="game-wrap">
  <canvas id="game" width="400" height="400"></canvas>
  <div class="overlay" id="overlay">
    <h2 id="overlay-title">GAME OVER</h2>
    <p id="overlay-sub">press space or tap to restart</p>
    <button id="restart-btn">Restart</button>
  </div>
</div>

<p class="controls-hint">Arrow keys or WASD to move. Space to pause/restart.</p>

<div class="touch-controls">
  <div></div>
  <button id="btn-up">▲</button>
  <div></div>
  <button id="btn-left">◀</button>
  <button id="btn-down">▼</button>
  <button id="btn-right">▶</button>
</div>

<script>
const GRID = 20;
const CELL = 20; // canvas is 400x400 => 20x20 grid
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

let snake, dir, nextDir, food, score, best, running, gameOver, loopId;

function loadBest(){
  return parseInt(localStorage.getItem('snake_best') || '0', 10);
}
function saveBest(v){
  localStorage.setItem('snake_best', String(v));
}

function resetGame(){
  snake = [
    {x:10, y:10}, {x:9, y:10}, {x:8, y:10}
  ];
  dir = {x:1, y:0};
  nextDir = {x:1, y:0};
  score = 0;
  gameOver = false;
  running = true;
  placeFood();
  document.getElementById('overlay').classList.remove('show');
  updateHud();
}

function placeFood(){
  let pos;
  do{
    pos = { x: Math.floor(Math.random()*GRID), y: Math.floor(Math.random()*GRID) };
  } while(snake.some(s => s.x === pos.x && s.y === pos.y));
  food = pos;
}

function updateHud(){
  document.getElementById('score').textContent = score;
  document.getElementById('best').textContent = best;
}

function tick(){
  if(!running) return;
  dir = nextDir;
  const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

  // wall collision
  if(head.x < 0 || head.x >= GRID || head.y < 0 || head.y >= GRID){
    return endGame();
  }
  // self collision
  if(snake.some(s => s.x === head.x && s.y === head.y)){
    return endGame();
  }

  snake.unshift(head);

  if(head.x === food.x && head.y === food.y){
    score++;
    if(score > best){ best = score; saveBest(best); }
    updateHud();
    placeFood();
  } else {
    snake.pop();
  }

  draw();
}

function endGame(){
  running = false;
  gameOver = true;
  const overlay = document.getElementById('overlay');
  document.getElementById('overlay-title').textContent = 'GAME OVER';
  document.getElementById('overlay-sub').textContent = `score: ${score} — press space or tap to restart`;
  overlay.classList.add('show');
}

function draw(){
  ctx.fillStyle = '#010602';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // faint grid
  ctx.strokeStyle = 'rgba(57,255,106,0.05)';
  ctx.lineWidth = 1;
  for(let i=0; i<=GRID; i++){
    ctx.beginPath(); ctx.moveTo(i*CELL, 0); ctx.lineTo(i*CELL, canvas.height); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, i*CELL); ctx.lineTo(canvas.width, i*CELL); ctx.stroke();
  }

  // food
  ctx.fillStyle = '#39ff6a';
  ctx.shadowColor = '#39ff6a';
  ctx.shadowBlur = 12;
  ctx.fillRect(food.x*CELL+3, food.y*CELL+3, CELL-6, CELL-6);
  ctx.shadowBlur = 0;

  // snake
  snake.forEach((s, i)=>{
    ctx.fillStyle = i === 0 ? '#c8ffd8' : '#39ff6a';
    ctx.shadowColor = '#39ff6a';
    ctx.shadowBlur = i === 0 ? 10 : 4;
    ctx.fillRect(s.x*CELL+1, s.y*CELL+1, CELL-2, CELL-2);
  });
  ctx.shadowBlur = 0;
}

function setDir(x, y){
  // prevent reversing directly into itself
  if(dir.x === -x && dir.y === -y) return;
  nextDir = {x, y};
}

document.addEventListener('keydown', (e)=>{
  switch(e.key){
    case 'ArrowUp': case 'w': case 'W': setDir(0,-1); e.preventDefault(); break;
    case 'ArrowDown': case 's': case 'S': setDir(0,1); e.preventDefault(); break;
    case 'ArrowLeft': case 'a': case 'A': setDir(-1,0); e.preventDefault(); break;
    case 'ArrowRight': case 'd': case 'D': setDir(1,0); e.preventDefault(); break;
    case ' ':
      e.preventDefault();
      if(gameOver) resetGame();
      else running = !running;
      break;
  }
});

document.getElementById('btn-up').addEventListener('click', ()=> setDir(0,-1));
document.getElementById('btn-down').addEventListener('click', ()=> setDir(0,1));
document.getElementById('btn-left').addEventListener('click', ()=> setDir(-1,0));
document.getElementById('btn-right').addEventListener('click', ()=> setDir(1,0));
document.getElementById('restart-btn').addEventListener('click', resetGame);
document.getElementById('overlay').addEventListener('click', ()=>{ if(gameOver) resetGame(); });

best = loadBest();
resetGame();
draw();

let speed = 110; // ms per tick
setInterval(tick, speed);
</script>
</body>
</html>
