<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2048</title>
<link rel="icon" type="image/svg+xml" href="../../../favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#faf1e6;
    --board:#e4d3bd;
    --cell-empty:rgba(238,225,205,0.5);
    --text:#5b4636;
    --muted:#a1907c;
    --accent:#e8926a;
  }
  html{ touch-action:manipulation; }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:24px;
    background:var(--bg);
    color:var(--text);
    font-family:'Fredoka', sans-serif;
    overflow-x:hidden;
  }

  .back-link{
    align-self:flex-start;
    display:inline-flex; align-items:center; gap:6px;
    color:var(--muted); text-decoration:none;
    font-size:14px; margin-bottom:14px; font-weight:500;
  }
  .back-link:hover{ color:var(--accent); }

  h1{
    font-size:42px;
    font-weight:700;
    margin:0 0 4px;
    color:var(--text);
  }
  .subtitle{
    font-size:13px;
    color:var(--muted);
    margin-bottom:18px;
  }

  .hud{
    display:flex;
    gap:12px;
    margin-bottom:16px;
  }
  .hud-box{
    background:var(--board);
    border-radius:10px;
    padding:8px 20px;
    text-align:center;
  }
  .hud-box .label{ font-size:10px; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); font-weight:500; }
  .hud-box .value{ font-size:22px; font-weight:700; }

  .board-wrap{
    position:relative;
    background:var(--board);
    border-radius:16px;
    padding:10px;
    width:min(420px, 90vw);
    aspect-ratio:1;
  }
  .board{
    position:relative;
    display:grid;
    grid-template-columns:repeat(4, 1fr);
    grid-template-rows:repeat(4, 1fr);
    gap:10px;
    width:100%;
    height:100%;
  }
  .cell-bg{
    background:var(--cell-empty);
    border-radius:8px;
  }
  .tile{
    position:absolute;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:8px;
    font-weight:700;
    transition:top .12s ease, left .12s ease;
  }
  .tile-spawn{ animation:spawn .15s ease-out; }
  @keyframes spawn{ from{ transform:scale(0.3); } to{ transform:scale(1); } }
  .tile-merge{ animation:merge .15s ease-out; }
  @keyframes merge{ 0%{ transform:scale(1); } 50%{ transform:scale(1.15); } 100%{ transform:scale(1); } }

  .overlay{
    position:absolute; inset:10px;
    display:none;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    gap:12px;
    background:rgba(250,241,230,0.9);
    border-radius:12px;
    text-align:center;
    z-index:10;
  }
  .overlay.show{ display:flex; }
  .overlay h2{ font-size:28px; margin:0; }
  .overlay p{ margin:0; color:var(--muted); font-size:14px; }

  button{
    font-family:'Fredoka', sans-serif;
    font-weight:700;
    font-size:14px;
    background:var(--accent);
    color:#fff;
    border:none;
    border-radius:10px;
    padding:10px 22px;
    cursor:pointer;
    margin-top:16px;
    transition:filter .15s ease, transform .08s ease;
  }
  button:hover{ filter:brightness(1.08); }
  button:active{ transform:scale(.96); }

  .controls-hint{
    margin-top:14px;
    font-size:12px;
    color:var(--muted);
    text-align:center;
  }
</style>
</head>
<body>

<a class="back-link" href="../../index.html">← Arcade</a>
<h1>2048</h1>
<p class="subtitle">swipe or arrow keys — merge your way up</p>

<div class="hud">
  <div class="hud-box"><div class="label">Score</div><div class="value" id="score">0</div></div>
  <div class="hud-box"><div class="label">Best</div><div class="value" id="best">0</div></div>
</div>

<div class="board-wrap">
  <div class="board" id="board">
    <div class="overlay" id="overlay">
      <h2 id="overlay-title">Game Over</h2>
      <p id="overlay-sub"></p>
      <button type="button" id="overlay-restart">Try Again</button>
    </div>
  </div>
</div>

<button type="button" id="restart-btn">New Game</button>
<p class="controls-hint">Reach 2048 to win — but you can keep playing after.</p>

<script>
const SIZE = 4;
const TILE_COLORS = {
  2:    { bg:'#f4e4d7', text:'#5b4636' },
  4:    { bg:'#efd9bd', text:'#5b4636' },
  8:    { bg:'#f0b884', text:'#fff' },
  16:   { bg:'#eda05f', text:'#fff' },
  32:   { bg:'#e8926a', text:'#fff' },
  64:   { bg:'#e17555', text:'#fff' },
  128:  { bg:'#e8d16f', text:'#fff' },
  256:  { bg:'#e5c94a', text:'#fff' },
  512:  { bg:'#e2c02a', text:'#fff' },
  1024: { bg:'#8fbf8f', text:'#fff' },
  2048: { bg:'#6ba86b', text:'#fff' },
};
const TILE_FALLBACK = { bg:'#4a7a5a', text:'#fff' };

let grid, score, best, gameOver, won, keepPlayingAfterWin, tileIdCounter;

function emptyGrid(){ return Array.from({length: SIZE}, ()=> Array(SIZE).fill(null)); }

function loadBest(){ return parseInt(localStorage.getItem('2048_best') || '0', 10); }
function saveBest(v){ localStorage.setItem('2048_best', String(v)); }

function randomEmptyCell(){
  const empties = [];
  for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++) if(!grid[r][c]) empties.push([r,c]);
  if(empties.length === 0) return null;
  return empties[Math.floor(Math.random()*empties.length)];
}

function spawnTile(){
  const cell = randomEmptyCell();
  if(!cell) return;
  const [r,c] = cell;
  grid[r][c] = { value: Math.random() < 0.9 ? 2 : 4, id: tileIdCounter++, isNew: true };
}

function startGame(){
  grid = emptyGrid();
  score = 0;
  gameOver = false;
  won = false;
  keepPlayingAfterWin = false;
  tileIdCounter = 1;
  spawnTile();
  spawnTile();
  document.getElementById('overlay').classList.remove('show');
  updateHud();
  render();
}

function updateHud(){
  document.getElementById('score').textContent = score;
  document.getElementById('best').textContent = best;
}

function slideAndMergeLine(line){
  const filtered = line.filter(t => t !== null);
  const merged = [];
  let scoreGain = 0;
  let i = 0;
  while(i < filtered.length){
    if(i+1 < filtered.length && filtered[i].value === filtered[i+1].value){
      const newValue = filtered[i].value * 2;
      merged.push({ value: newValue, id: filtered[i].id, isMerged: true });
      scoreGain += newValue;
      if(newValue === 2048 && !won) won = true;
      i += 2;
    } else {
      merged.push({ value: filtered[i].value, id: filtered[i].id });
      i += 1;
    }
  }
  while(merged.length < line.length) merged.push(null);
  return { line: merged, scoreGain };
}

function transpose(g){
  const out = Array.from({length: SIZE}, ()=> Array(SIZE).fill(null));
  for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++) out[c][r] = g[r][c];
  return out;
}

function move(direction){
  if(gameOver) return;
  let g = grid.map(row => row.map(t => t ? {...t, isNew:false, isMerged:false} : null));
  let totalScore = 0;

  if(direction === 'up' || direction === 'down') g = transpose(g);
  if(direction === 'right' || direction === 'down') g = g.map(row => row.slice().reverse());

  g = g.map(row => {
    const result = slideAndMergeLine(row);
    totalScore += result.scoreGain;
    return result.line;
  });

  if(direction === 'right' || direction === 'down') g = g.map(row => row.slice().reverse());
  if(direction === 'up' || direction === 'down') g = transpose(g);

  const moved = JSON.stringify(g.map(r=>r.map(t=>t?t.value:null))) !== JSON.stringify(grid.map(r=>r.map(t=>t?t.value:null)));
  if(!moved) return;

  grid = g;
  score += totalScore;
  if(score > best){ best = score; saveBest(best); }
  spawnTile();
  updateHud();
  render();

  if(won && !keepPlayingAfterWin){
    endGame('win');
    return;
  }
  if(!canMove()){
    endGame('lose');
  }
}

function canMove(){
  for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++){
    if(!grid[r][c]) return true;
    if(c+1<SIZE && grid[r][c+1] && grid[r][c].value === grid[r][c+1].value) return true;
    if(r+1<SIZE && grid[r+1][c] && grid[r][c].value === grid[r+1][c].value) return true;
  }
  return false;
}

function endGame(result){
  gameOver = true;
  const overlay = document.getElementById('overlay');
  if(result === 'win'){
    document.getElementById('overlay-title').textContent = 'You hit 2048!';
    document.getElementById('overlay-sub').textContent = `Score: ${score}`;
    document.getElementById('overlay-restart').textContent = 'Keep Playing';
    document.getElementById('overlay-restart').onclick = ()=>{
      gameOver = false;
      keepPlayingAfterWin = true;
      overlay.classList.remove('show');
    };
  } else {
    document.getElementById('overlay-title').textContent = 'Game Over';
    document.getElementById('overlay-sub').textContent = `Final score: ${score}`;
    document.getElementById('overlay-restart').textContent = 'Try Again';
    document.getElementById('overlay-restart').onclick = startGame;
  }
  overlay.classList.add('show');
}

function render(){
  const boardEl = document.getElementById('board');
  // remove old tiles (keep the overlay div)
  [...boardEl.querySelectorAll('.tile, .cell-bg')].forEach(el => el.remove());

  // background grid cells
  for(let i=0;i<SIZE*SIZE;i++){
    const bg = document.createElement('div');
    bg.className = 'cell-bg';
    boardEl.appendChild(bg);
  }

  const cellSize = boardEl.clientWidth / SIZE;
  const gap = 10;
  const step = (boardEl.clientWidth - gap) / SIZE;

  for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++){
    const t = grid[r][c];
    if(!t) continue;
    const tileEl = document.createElement('div');
    const colors = TILE_COLORS[t.value] || TILE_FALLBACK;
    tileEl.className = 'tile' + (t.isNew ? ' tile-spawn' : '') + (t.isMerged ? ' tile-merge' : '');
    tileEl.style.background = colors.bg;
    tileEl.style.color = colors.text;
    tileEl.style.width = `calc(${step}px - ${gap}px)`;
    tileEl.style.height = `calc(${step}px - ${gap}px)`;
    tileEl.style.top = `${r * step}px`;
    tileEl.style.left = `${c * step}px`;
    tileEl.style.fontSize = t.value >= 1024 ? '22px' : t.value >= 128 ? '26px' : '30px';
    tileEl.textContent = t.value;
    boardEl.appendChild(tileEl);
  }
}

document.addEventListener('keydown', (e)=>{
  const map = { ArrowUp:'up', ArrowDown:'down', ArrowLeft:'left', ArrowRight:'right', w:'up', s:'down', a:'left', d:'right' };
  const dir = map[e.key];
  if(!dir) return;
  e.preventDefault();
  move(dir);
});

// touch swipe
let touchStartX = 0, touchStartY = 0;
const boardWrapEl = document.querySelector('.board-wrap');
boardWrapEl.addEventListener('touchstart', (e)=>{
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, {passive:true});
boardWrapEl.addEventListener('touchend', (e)=>{
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if(Math.max(Math.abs(dx), Math.abs(dy)) < 24) return; // ignore tiny taps
  if(Math.abs(dx) > Math.abs(dy)){
    move(dx > 0 ? 'right' : 'left');
  } else {
    move(dy > 0 ? 'down' : 'up');
  }
});

document.getElementById('restart-btn').addEventListener('click', startGame);

best = loadBest();
startGame();
window.addEventListener('resize', render);
</script>
</body>
</html>
