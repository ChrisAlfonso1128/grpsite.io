<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minesweeper</title>
<link rel="icon" type="image/svg+xml" href="../../../favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#181c14;
    --panel:#20261a;
    --panel-2:#2a3120;
    --border:#454f34;
    --text:#e8ecd8;
    --muted:#8a9271;
    --warn:#ff5c33;
    --warn-dim:#c94420;
    --flag:#ffb020;
    --safe:#7ec850;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:24px;
    background:
      repeating-linear-gradient(135deg, rgba(255,92,51,0.03) 0px, rgba(255,92,51,0.03) 2px, transparent 2px, transparent 40px),
      var(--bg);
    color:var(--text);
    font-family:'Oswald', sans-serif;
    overflow-x:hidden;
  }

  .back-link{
    align-self:flex-start;
    display:inline-flex; align-items:center; gap:6px;
    color:var(--muted); text-decoration:none;
    font-size:13px; margin-bottom:14px; font-weight:500;
  }
  .back-link:hover{ color:var(--warn); }

  h1{
    font-size:30px;
    font-weight:700;
    letter-spacing:.06em;
    text-transform:uppercase;
    margin:0 0 4px;
    color:var(--warn);
  }
  .subtitle{
    font-size:12px;
    color:var(--muted);
    margin-bottom:18px;
    letter-spacing:.1em;
    text-transform:uppercase;
  }

  .hud{
    display:flex;
    gap:12px;
    margin-bottom:16px;
    align-items:center;
    flex-wrap:wrap;
    justify-content:center;
  }
  .hud-box{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:6px;
    padding:8px 16px;
    text-align:center;
    min-width:70px;
  }
  .hud-box .label{ font-size:9px; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; }
  .hud-box .value{ font-family:'JetBrains Mono',monospace; font-size:20px; font-weight:700; color:var(--flag); }

  .difficulty-select{
    display:flex;
    gap:8px;
    margin-bottom:16px;
    flex-wrap:wrap;
    justify-content:center;
  }
  .pill{
    font-family:'Oswald', sans-serif;
    font-size:13px;
    font-weight:500;
    background:var(--panel);
    color:var(--muted);
    border:1px solid var(--border);
    border-radius:4px;
    padding:8px 16px;
    cursor:pointer;
    transition:border-color .15s ease, color .15s ease;
  }
  .pill:hover{ color:var(--text); }
  .pill.active{ border-color:var(--warn); color:var(--text); background:rgba(255,92,51,0.12); }

  button{
    font-family:'Oswald', sans-serif;
    font-weight:500;
    font-size:13px;
    background:var(--panel-2);
    color:var(--text);
    border:1px solid var(--border);
    border-radius:4px;
    padding:9px 18px;
    cursor:pointer;
    transition:border-color .15s ease, transform .08s ease;
  }
  button:hover{ border-color:var(--warn); }
  button:active{ transform:scale(.96); }
  button.active{ border-color:var(--flag); color:var(--flag); }

  .board-wrap{
    position:relative;
    border:2px solid var(--border);
    border-radius:4px;
    padding:8px;
    background:var(--panel);
    overflow-x:auto;
    max-width:94vw;
  }
  .board{
    display:grid;
    gap:2px;
  }
  .cell{
    width:28px; height:28px;
    background:var(--panel-2);
    border:1px solid var(--border);
    border-radius:2px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'JetBrains Mono',monospace;
    font-weight:700;
    font-size:13px;
    cursor:pointer;
    user-select:none;
    -webkit-user-select:none;
    transition:background .1s ease;
  }
  .cell:hover{ background:#333c24; }
  .cell.revealed{
    background:#141712;
    cursor:default;
    border-color:#2a3120;
  }
  .cell.revealed:hover{ background:#141712; }
  .cell.mine{ background:var(--warn); }
  .cell.mine-hit{ background:#fff; }
  .cell.flagged{ color:var(--flag); }
  .cell[data-n="1"]{ color:#6fb2ff; }
  .cell[data-n="2"]{ color:var(--safe); }
  .cell[data-n="3"]{ color:var(--warn); }
  .cell[data-n="4"]{ color:#b06fff; }
  .cell[data-n="5"]{ color:#ff6f9c; }
  .cell[data-n="6"]{ color:#ffd23f; }
  .cell[data-n="7"]{ color:#ffffff; }
  .cell[data-n="8"]{ color:var(--muted); }

  .overlay{
    position:absolute; inset:0;
    display:none;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    gap:12px;
    background:rgba(20,23,18,0.92);
    text-align:center;
  }
  .overlay.show{ display:flex; }
  .overlay h2{
    font-size:22px;
    margin:0;
    letter-spacing:.05em;
    text-transform:uppercase;
  }
  .overlay p{ margin:0; color:var(--muted); font-size:13px; }

  .controls-hint{
    margin-top:16px;
    font-size:11px;
    color:var(--muted);
    text-align:center;
    max-width:340px;
  }
</style>
</head>
<body>

<a class="back-link" href="../../index.html">← Arcade</a>
<h1>Minesweeper</h1>
<p class="subtitle">// defuse the field</p>

<div class="difficulty-select" id="difficulty-select">
  <button type="button" class="pill active" data-diff="beginner">Beginner 9×9</button>
  <button type="button" class="pill" data-diff="intermediate">Intermediate 16×16</button>
  <button type="button" class="pill" data-diff="expert">Expert 16×30</button>
</div>

<div class="hud">
  <div class="hud-box"><div class="label">Mines</div><div class="value" id="mine-count">10</div></div>
  <div class="hud-box"><div class="label">Time</div><div class="value" id="timer">000</div></div>
  <button type="button" id="flag-mode-btn">🚩 Flag Mode</button>
  <button type="button" id="restart-btn">↻ Restart</button>
</div>

<div class="board-wrap">
  <div class="board" id="board"></div>
  <div class="overlay" id="overlay">
    <h2 id="overlay-title">BOOM</h2>
    <p id="overlay-sub"></p>
    <button type="button" id="overlay-restart-btn">Try Again</button>
  </div>
</div>

<p class="controls-hint">Tap to reveal. Right-click (or long-press on mobile, or toggle Flag Mode) to flag a suspected mine.</p>

<script>
const DIFFICULTIES = {
  beginner:     { rows: 9,  cols: 9,  mines: 10 },
  intermediate: { rows: 16, cols: 16, mines: 40 },
  expert:       { rows: 16, cols: 30, mines: 99 },
};

let rows, cols, mineTotal, cells, revealedCount, flagCount, gameOver, gameWon, started, timerInterval, seconds, flagMode, currentDiff;

function initBoard(diff){
  currentDiff = diff;
  const cfg = DIFFICULTIES[diff];
  rows = cfg.rows; cols = cfg.cols; mineTotal = cfg.mines;
  cells = Array.from({length: rows}, ()=> Array(cols).fill(null).map(()=> ({
    mine:false, adjacent:0, revealed:false, flagged:false
  })));
  revealedCount = 0;
  flagCount = 0;
  gameOver = false;
  gameWon = false;
  started = false;
  seconds = 0;
  clearInterval(timerInterval);
  document.getElementById('timer').textContent = '000';
  document.getElementById('mine-count').textContent = mineTotal;
  document.getElementById('overlay').classList.remove('show');
  buildBoardDom();
}

function buildBoardDom(){
  const boardEl = document.getElementById('board');
  boardEl.style.gridTemplateColumns = `repeat(${cols}, 28px)`;
  boardEl.innerHTML = '';
  for(let y=0; y<rows; y++){
    for(let x=0; x<cols; x++){
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.dataset.x = x;
      cell.dataset.y = y;
      cell.addEventListener('click', ()=> handleCellClick(x, y));
      cell.addEventListener('contextmenu', (e)=>{ e.preventDefault(); toggleFlag(x, y); });
      attachLongPress(cell, x, y);
      boardEl.appendChild(cell);
    }
  }
}

function attachLongPress(cell, x, y){
  let pressTimer = null;
  let longPressed = false;
  cell.addEventListener('touchstart', ()=>{
    longPressed = false;
    pressTimer = setTimeout(()=>{ longPressed = true; toggleFlag(x, y); }, 450);
  }, {passive:true});
  cell.addEventListener('touchend', (e)=>{
    clearTimeout(pressTimer);
    if(longPressed) e.preventDefault();
  });
  cell.addEventListener('touchmove', ()=> clearTimeout(pressTimer));
}

function placeMines(safeX, safeY){
  const excluded = new Set();
  for(let dy=-1; dy<=1; dy++) for(let dx=-1; dx<=1; dx++){
    const nx=safeX+dx, ny=safeY+dy;
    if(nx>=0 && nx<cols && ny>=0 && ny<rows) excluded.add(`${nx},${ny}`);
  }
  let placed = 0;
  while(placed < mineTotal){
    const x = Math.floor(Math.random()*cols);
    const y = Math.floor(Math.random()*rows);
    if(excluded.has(`${x},${y}`) || cells[y][x].mine) continue;
    cells[y][x].mine = true;
    placed++;
  }
  for(let y=0;y<rows;y++) for(let x=0;x<cols;x++){
    if(cells[y][x].mine) continue;
    let count=0;
    for(let dy=-1; dy<=1; dy++) for(let dx=-1; dx<=1; dx++){
      if(dx===0&&dy===0) continue;
      const nx=x+dx, ny=y+dy;
      if(nx>=0&&nx<cols&&ny>=0&&ny<rows&&cells[ny][nx].mine) count++;
    }
    cells[y][x].adjacent = count;
  }
}

function handleCellClick(x, y){
  if(gameOver) return;
  const cell = cells[y][x];
  if(cell.flagged) return;

  if(flagMode){
    toggleFlag(x, y);
    return;
  }

  if(!started){
    started = true;
    placeMines(x, y);
    startTimer();
  }

  if(cell.mine){
    revealAllMines(x, y);
    endGame(false);
    return;
  }

  floodReveal(x, y);
  render();

  if(revealedCount === rows*cols - mineTotal){
    endGame(true);
  }
}

function toggleFlag(x, y){
  if(gameOver) return;
  const cell = cells[y][x];
  if(cell.revealed) return;
  cell.flagged = !cell.flagged;
  flagCount += cell.flagged ? 1 : -1;
  document.getElementById('mine-count').textContent = mineTotal - flagCount;
  render();
}

function floodReveal(x, y){
  const stack = [[x,y]];
  while(stack.length){
    const [cx,cy] = stack.pop();
    const cell = cells[cy][cx];
    if(cell.revealed || cell.flagged) continue;
    cell.revealed = true;
    revealedCount++;
    if(cell.adjacent === 0 && !cell.mine){
      for(let dy=-1; dy<=1; dy++) for(let dx=-1; dx<=1; dx++){
        if(dx===0&&dy===0) continue;
        const nx=cx+dx, ny=cy+dy;
        if(nx>=0&&nx<cols&&ny>=0&&ny<rows && !cells[ny][nx].revealed) stack.push([nx,ny]);
      }
    }
  }
}

function revealAllMines(hitX, hitY){
  cells.forEach((row,y)=> row.forEach((c,x)=>{
    if(c.mine){ c.revealed = true; c._hit = (x===hitX && y===hitY); }
  }));
}

function startTimer(){
  timerInterval = setInterval(()=>{
    seconds++;
    document.getElementById('timer').textContent = String(Math.min(seconds,999)).padStart(3,'0');
  }, 1000);
}

function endGame(won){
  gameOver = true;
  gameWon = won;
  clearInterval(timerInterval);
  render();
  const overlay = document.getElementById('overlay');
  document.getElementById('overlay-title').textContent = won ? 'FIELD CLEARED' : 'BOOM';
  document.getElementById('overlay-sub').textContent = won
    ? `Cleared in ${seconds}s`
    : 'Hit a mine — field revealed.';
  overlay.classList.add('show');
}

function render(){
  const boardEl = document.getElementById('board');
  for(let y=0; y<rows; y++){
    for(let x=0; x<cols; x++){
      const cell = cells[y][x];
      const el = boardEl.children[y*cols + x];
      el.className = 'cell';
      el.textContent = '';
      delete el.dataset.n;

      if(cell.revealed){
        el.classList.add('revealed');
        if(cell.mine){
          el.classList.add('mine');
          if(cell._hit) el.classList.add('mine-hit');
          el.textContent = '💣';
        } else if(cell.adjacent > 0){
          el.textContent = cell.adjacent;
          el.dataset.n = cell.adjacent;
        }
      } else if(cell.flagged){
        el.classList.add('flagged');
        el.textContent = '🚩';
      }
    }
  }
}

document.getElementById('difficulty-select').addEventListener('click', (e)=>{
  const btn = e.target.closest('.pill');
  if(!btn) return;
  document.querySelectorAll('.difficulty-select .pill').forEach(b=> b.classList.remove('active'));
  btn.classList.add('active');
  initBoard(btn.dataset.diff);
});

document.getElementById('restart-btn').addEventListener('click', ()=> initBoard(currentDiff));
document.getElementById('overlay-restart-btn').addEventListener('click', ()=> initBoard(currentDiff));

flagMode = false;
document.getElementById('flag-mode-btn').addEventListener('click', (e)=>{
  flagMode = !flagMode;
  e.target.classList.toggle('active', flagMode);
});

initBoard('beginner');
</script>
</body>
</html>
