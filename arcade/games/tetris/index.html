<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tetris</title>
<link rel="icon" type="image/svg+xml" href="../../../favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Chakra+Petch:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-top:#0d0221;
    --bg-bottom:#1a0538;
    --grid:#2a1454;
    --neon-pink:#ff2fd6;
    --neon-cyan:#2fe6ff;
    --neon-purple:#a12fff;
    --panel:#170a33;
    --panel-border:#3d1e6e;
    --text:#f1e9ff;
    --muted:#8a72b8;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:24px;
    background:linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
    color:var(--text);
    font-family:'Chakra Petch', sans-serif;
    position:relative;
    overflow-x:hidden;
  }
  /* horizon grid effect */
  body::before{
    content:"";
    position:fixed;
    left:0; right:0; bottom:0; height:45vh;
    background:
      repeating-linear-gradient(90deg, rgba(255,47,214,0.12) 0px, transparent 1px, transparent 40px, rgba(255,47,214,0.12) 41px),
      repeating-linear-gradient(0deg, rgba(47,230,255,0.08) 0px, transparent 1px, transparent 40px);
    transform:perspective(300px) rotateX(60deg);
    transform-origin:bottom;
    pointer-events:none;
    opacity:.5;
  }

  .back-link{
    align-self:flex-start;
    display:inline-flex; align-items:center; gap:6px;
    color:var(--muted); text-decoration:none;
    font-size:13px; margin-bottom:16px;
    font-weight:600;
    z-index:1;
  }
  .back-link:hover{ color:var(--neon-cyan); }

  h1{
    font-family:'Press Start 2P', cursive;
    font-size:28px;
    margin:0 0 6px;
    text-align:center;
    background:linear-gradient(90deg, var(--neon-pink), var(--neon-cyan));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    text-shadow:0 0 30px rgba(255,47,214,0.3);
    z-index:1;
  }
  .subtitle{
    font-size:12px;
    color:var(--muted);
    margin-bottom:22px;
    letter-spacing:.1em;
    text-transform:uppercase;
    z-index:1;
  }

  .layout{
    display:flex;
    gap:24px;
    align-items:flex-start;
    z-index:1;
    flex-wrap:wrap;
    justify-content:center;
  }

  .board-wrap{
    position:relative;
    border:3px solid var(--panel-border);
    border-radius:6px;
    box-shadow:0 0 30px rgba(161,47,255,0.35), inset 0 0 30px rgba(47,230,255,0.05);
    background:#0a0420;
  }
  canvas#board{ display:block; }

  .side-panel{
    display:flex;
    flex-direction:column;
    gap:16px;
    width:160px;
  }
  .panel-box{
    background:var(--panel);
    border:2px solid var(--panel-border);
    border-radius:6px;
    padding:14px;
  }
  .panel-box .label{
    font-family:'Press Start 2P', cursive;
    font-size:10px;
    color:var(--neon-cyan);
    margin-bottom:10px;
    letter-spacing:.05em;
  }
  .panel-box .value{
    font-family:'Press Start 2P', cursive;
    font-size:18px;
    color:var(--text);
  }
  canvas#next{ display:block; margin:0 auto; }

  .controls-hint{
    font-size:11px;
    color:var(--muted);
    line-height:1.7;
  }
  .controls-hint b{ color:var(--text); }

  .overlay{
    position:absolute; inset:0;
    display:none;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    gap:14px;
    background:rgba(10,4,32,0.9);
    text-align:center;
    border-radius:4px;
  }
  .overlay.show{ display:flex; }
  .overlay h2{
    font-family:'Press Start 2P', cursive;
    font-size:20px;
    margin:0;
    color:var(--neon-pink);
    text-shadow:0 0 16px rgba(255,47,214,0.6);
  }
  .overlay p{ margin:0; color:var(--muted); font-size:13px; }

  button{
    font-family:'Chakra Petch', sans-serif;
    font-weight:600;
    font-size:14px;
    background:linear-gradient(135deg, var(--neon-pink), var(--neon-purple));
    color:#fff;
    border:none;
    border-radius:6px;
    padding:10px 22px;
    cursor:pointer;
    transition:filter .15s ease, transform .08s ease;
  }
  button:hover{ filter:brightness(1.15); }
  button:active{ transform:scale(.96); }

  .touch-controls{
    display:none;
    margin-top:18px;
    gap:8px;
    grid-template-columns:repeat(4, 56px);
    z-index:1;
  }
  .touch-controls button{ padding:0; height:48px; font-size:18px; }
  @media (pointer:coarse){
    .touch-controls{ display:grid; }
  }
</style>
</head>
<body>

<a class="back-link" href="../../index.html">← Arcade</a>
<h1>TETRIS</h1>
<p class="subtitle">// neon drop</p>

<div class="layout">
  <div class="board-wrap">
    <canvas id="board" width="240" height="480"></canvas>
    <div class="overlay" id="overlay">
      <h2 id="overlay-title">GAME OVER</h2>
      <p id="overlay-sub">score: 0</p>
      <button id="restart-btn">Restart</button>
    </div>
  </div>

  <div class="side-panel">
    <div class="panel-box">
      <div class="label">NEXT</div>
      <canvas id="next" width="100" height="100"></canvas>
    </div>
    <div class="panel-box">
      <div class="label">SCORE</div>
      <div class="value" id="score">0</div>
    </div>
    <div class="panel-box">
      <div class="label">LINES</div>
      <div class="value" id="lines">0</div>
    </div>
    <div class="panel-box">
      <div class="label">LEVEL</div>
      <div class="value" id="level">1</div>
    </div>
    <div class="panel-box controls-hint">
      <b>◀ ▶</b> move<br>
      <b>▲</b> rotate<br>
      <b>▼</b> soft drop<br>
      <b>Space</b> hard drop<br>
      <b>P</b> pause
    </div>
  </div>
</div>

<div class="touch-controls">
  <button id="btn-left">◀</button>
  <button id="btn-rotate">↻</button>
  <button id="btn-down">▼</button>
  <button id="btn-right">▶</button>
</div>

<script>
const COLS = 12, ROWS = 24, CELL = 20;
const boardCanvas = document.getElementById('board');
const ctx = boardCanvas.getContext('2d');
const nextCanvas = document.getElementById('next');
const nextCtx = nextCanvas.getContext('2d');

const COLORS = {
  I: '#2fe6ff',
  O: '#ffe74f',
  T: '#c34fff',
  S: '#4dff9e',
  Z: '#ff4f6e',
  J: '#4f7bff',
  L: '#ff9c3f'
};

// Each shape given as 4 rotation states, each a list of [x,y] cell offsets in a 4x4 box.
const SHAPES = {
  I: [
    [[0,1],[1,1],[2,1],[3,1]],
    [[2,0],[2,1],[2,2],[2,3]],
    [[0,2],[1,2],[2,2],[3,2]],
    [[1,0],[1,1],[1,2],[1,3]]
  ],
  O: [
    [[1,0],[2,0],[1,1],[2,1]],
    [[1,0],[2,0],[1,1],[2,1]],
    [[1,0],[2,0],[1,1],[2,1]],
    [[1,0],[2,0],[1,1],[2,1]]
  ],
  T: [
    [[1,0],[0,1],[1,1],[2,1]],
    [[1,0],[1,1],[2,1],[1,2]],
    [[0,1],[1,1],[2,1],[1,2]],
    [[1,0],[0,1],[1,1],[1,2]]
  ],
  S: [
    [[1,0],[2,0],[0,1],[1,1]],
    [[1,0],[1,1],[2,1],[2,2]],
    [[1,1],[2,1],[0,2],[1,2]],
    [[0,0],[0,1],[1,1],[1,2]]
  ],
  Z: [
    [[0,0],[1,0],[1,1],[2,1]],
    [[2,0],[1,1],[2,1],[1,2]],
    [[0,1],[1,1],[1,2],[2,2]],
    [[1,0],[0,1],[1,1],[0,2]]
  ],
  J: [
    [[0,0],[0,1],[1,1],[2,1]],
    [[1,0],[2,0],[1,1],[1,2]],
    [[0,1],[1,1],[2,1],[2,2]],
    [[1,0],[1,1],[0,2],[1,2]]
  ],
  L: [
    [[2,0],[0,1],[1,1],[2,1]],
    [[1,0],[1,1],[1,2],[2,2]],
    [[0,1],[1,1],[2,1],[0,2]],
    [[0,0],[1,0],[1,1],[1,2]]
  ]
};
const PIECE_NAMES = Object.keys(SHAPES);

let grid, current, rotation, pos, nextPiece, score, lines, level, dropInterval, dropTimer, running, gameOver, paused, lastTime;

function emptyGrid(){
  return Array.from({length: ROWS}, ()=> Array(COLS).fill(null));
}

function randomPiece(){
  return PIECE_NAMES[Math.floor(Math.random() * PIECE_NAMES.length)];
}

function spawnPiece(){
  current = nextPiece || randomPiece();
  nextPiece = randomPiece();
  rotation = 0;
  pos = { x: Math.floor(COLS/2) - 2, y: -1 };
  drawNext();
  if(collides(current, rotation, pos)){
    endGame();
  }
}

function cellsFor(piece, rot){
  return SHAPES[piece][rot];
}

function collides(piece, rot, testPos){
  return cellsFor(piece, rot).some(([cx, cy])=>{
    const x = testPos.x + cx;
    const y = testPos.y + cy;
    if(x < 0 || x >= COLS || y >= ROWS) return true;
    if(y >= 0 && grid[y][x]) return true;
    return false;
  });
}

function lockPiece(){
  cellsFor(current, rotation).forEach(([cx, cy])=>{
    const x = pos.x + cx, y = pos.y + cy;
    if(y >= 0) grid[y][x] = current;
  });
  clearLines();
  spawnPiece();
}

function clearLines(){
  let cleared = 0;
  for(let y = ROWS - 1; y >= 0; y--){
    if(grid[y].every(c => c)){
      grid.splice(y, 1);
      grid.unshift(Array(COLS).fill(null));
      cleared++;
      y++; // re-check same index after shift
    }
  }
  if(cleared > 0){
    const points = [0, 100, 300, 500, 800][cleared] * level;
    score += points;
    lines += cleared;
    level = Math.floor(lines / 10) + 1;
    dropInterval = Math.max(120, 800 - (level - 1) * 70);
    updateHud();
  }
}

function move(dx, dy){
  const testPos = { x: pos.x + dx, y: pos.y + dy };
  if(!collides(current, rotation, testPos)){
    pos = testPos;
    return true;
  }
  return false;
}

function rotate(){
  const newRot = (rotation + 1) % 4;
  // simple wall-kick: try in place, then shifted left/right by 1-2 cells
  const kicks = [0, -1, 1, -2, 2];
  for(const dx of kicks){
    const testPos = { x: pos.x + dx, y: pos.y };
    if(!collides(current, newRot, testPos)){
      rotation = newRot;
      pos = testPos;
      return;
    }
  }
}

function hardDrop(){
  let dist = 0;
  while(move(0, 1)) dist++;
  score += dist * 2;
  lockPiece();
  updateHud();
}

function softDrop(){
  if(!move(0, 1)){
    lockPiece();
  } else {
    score += 1;
    updateHud();
  }
}

function updateHud(){
  document.getElementById('score').textContent = score;
  document.getElementById('lines').textContent = lines;
  document.getElementById('level').textContent = level;
}

function endGame(){
  running = false;
  gameOver = true;
  document.getElementById('overlay-sub').textContent = `score: ${score}`;
  document.getElementById('overlay').classList.add('show');
}

function resetGame(){
  grid = emptyGrid();
  score = 0; lines = 0; level = 1;
  dropInterval = 800;
  dropTimer = 0;
  running = true;
  gameOver = false;
  paused = false;
  nextPiece = randomPiece();
  spawnPiece();
  updateHud();
  document.getElementById('overlay').classList.remove('show');
}

function drawCell(context, x, y, color, cellSize){
  context.fillStyle = color;
  context.shadowColor = color;
  context.shadowBlur = 8;
  context.fillRect(x*cellSize+1, y*cellSize+1, cellSize-2, cellSize-2);
  context.shadowBlur = 0;
}

function draw(){
  ctx.fillStyle = '#0a0420';
  ctx.fillRect(0, 0, boardCanvas.width, boardCanvas.height);

  // grid lines
  ctx.strokeStyle = 'rgba(161,47,255,0.08)';
  for(let x=0; x<=COLS; x++){
    ctx.beginPath(); ctx.moveTo(x*CELL, 0); ctx.lineTo(x*CELL, ROWS*CELL); ctx.stroke();
  }
  for(let y=0; y<=ROWS; y++){
    ctx.beginPath(); ctx.moveTo(0, y*CELL); ctx.lineTo(COLS*CELL, y*CELL); ctx.stroke();
  }

  // locked cells
  for(let y=0; y<ROWS; y++){
    for(let x=0; x<COLS; x++){
      if(grid[y][x]) drawCell(ctx, x, y, COLORS[grid[y][x]], CELL);
    }
  }

  // current piece
  if(current){
    cellsFor(current, rotation).forEach(([cx, cy])=>{
      const x = pos.x + cx, y = pos.y + cy;
      if(y >= 0) drawCell(ctx, x, y, COLORS[current], CELL);
    });
  }
}

function drawNext(){
  nextCtx.clearRect(0, 0, nextCanvas.width, nextCanvas.height);
  const size = 20;
  cellsFor(nextPiece, 0).forEach(([cx, cy])=>{
    drawCell(nextCtx, cx, cy, COLORS[nextPiece], size);
  });
}

function loop(timestamp){
  if(!lastTime) lastTime = timestamp;
  const delta = timestamp - lastTime;
  lastTime = timestamp;

  if(running && !paused){
    dropTimer += delta;
    if(dropTimer > dropInterval){
      dropTimer = 0;
      if(!move(0, 1)){
        lockPiece();
      }
    }
    draw();
  }
  requestAnimationFrame(loop);
}

document.addEventListener('keydown', (e)=>{
  if(gameOver){
    if(e.key === ' ') resetGame();
    return;
  }
  switch(e.key){
    case 'ArrowLeft': move(-1, 0); e.preventDefault(); break;
    case 'ArrowRight': move(1, 0); e.preventDefault(); break;
    case 'ArrowDown': softDrop(); e.preventDefault(); break;
    case 'ArrowUp': rotate(); e.preventDefault(); break;
    case ' ': hardDrop(); e.preventDefault(); break;
    case 'p': case 'P': paused = !paused; break;
  }
  draw();
});

document.getElementById('btn-left').addEventListener('click', ()=>{ move(-1,0); draw(); });
document.getElementById('btn-right').addEventListener('click', ()=>{ move(1,0); draw(); });
document.getElementById('btn-down').addEventListener('click', ()=>{ softDrop(); draw(); });
document.getElementById('btn-rotate').addEventListener('click', ()=>{ rotate(); draw(); });
document.getElementById('restart-btn').addEventListener('click', resetGame);

resetGame();
requestAnimationFrame(loop);
</script>
</body>
</html>
